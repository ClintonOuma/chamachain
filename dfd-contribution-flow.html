<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChamaChain — M-Pesa Contribution Flow DFD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d14;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    min-height: 100vh;
  }

  h1 {
    color: rgba(255,255,255,0.85);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-align: center;
  }
  .subtitle {
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    margin-bottom: 40px;
    text-align: center;
  }

  /* ── DIAGRAM WRAPPER ── */
  .diagram {
    position: relative;
    width: 960px;
    min-height: 620px;
  }

  /* ── ACTOR HEADERS ── */
  .actors-row {
    display: flex;
    gap: 0;
    position: relative;
    z-index: 10;
  }

  .actor {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 160px;
    flex-shrink: 0;
  }

  .actor-box {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.18);
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    width: 140px;
    justify-content: center;
    position: relative;
    z-index: 10;
  }

  .actor-box svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* Individual actor colours */
  .actor-box.member   { background: #1e3a5f; border-color: #3b82f6; }
  .actor-box.frontend { background: #1a2f3f; border-color: #06b6d4; }
  .actor-box.backend  { background: #1a3320; border-color: #22c55e; }
  .actor-box.mpesa    { background: #3a1a1a; border-color: #ef4444; }
  .actor-box.database { background: #2a2010; border-color: #f59e0b; }

  /* ── LIFELINES ── */
  .lifelines {
    position: absolute;
    top: 54px;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
  }

  .lifeline {
    width: 160px;
    flex-shrink: 0;
    display: flex;
    justify-content: center;
  }

  .lifeline-line {
    width: 2px;
    height: 100%;
    opacity: 0.5;
  }

  .lifeline-line.member   { background: #3b82f6; }
  .lifeline-line.frontend { background: #06b6d4; }
  .lifeline-line.backend  { background: #22c55e; }
  .lifeline-line.mpesa    { background: #ef4444; }
  .lifeline-line.database { background: #f59e0b; }

  /* ── SEQUENCE STEPS ── */
  .steps {
    position: relative;
    margin-top: 0;
    padding-top: 20px;
    min-height: 560px;
  }

  .step {
    position: absolute;
    display: flex;
    align-items: center;
    width: 100%;
  }

  /* The numbered dot on the originating lifeline */
  .step-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    position: absolute;
    z-index: 20;
    transform: translateX(-50%);
  }

  /* The horizontal arrow line */
  .step-line {
    position: absolute;
    height: 1.5px;
    top: 10px;
  }

  /* Arrow label */
  .step-label {
    position: absolute;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
    white-space: nowrap;
    top: -16px;
  }

  /* Arrow head (right-pointing triangle) */
  .arrow-head {
    position: absolute;
    width: 0;
    height: 0;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    top: 5px;
  }

  /* Arrow head left-pointing */
  .arrow-head-left {
    position: absolute;
    width: 0;
    height: 0;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    top: 5px;
  }

  .print-btn {
    margin-top: 36px;
    padding: 10px 28px;
    background: rgba(74,195,255,0.15);
    border: 1px solid rgba(74,195,255,0.4);
    border-radius: 8px;
    color: #4ac3ff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .print-btn:hover { background: rgba(74,195,255,0.25); }

  @media print {
    body { background: #fff; padding: 0; }
    .print-btn { display: none; }
    h1, .subtitle { color: #000; }
  }
</style>
</head>
<body>

<h1>Figure 3.X: Data Flow Diagram — M-Pesa Contribution Process</h1>
<p class="subtitle">ChamaChain Platform · Level-1 DFD · M-Pesa STK Push Contribution Flow</p>

<div class="diagram">

  <!-- ACTOR HEADER ROW -->
  <div class="actors-row">

    <div class="actor">
      <div class="actor-box member">
        <!-- User icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Member
      </div>
    </div>

    <div class="actor">
      <div class="actor-box frontend">
        <!-- Monitor icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Frontend
      </div>
    </div>

    <div class="actor">
      <div class="actor-box backend">
        <!-- Server icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="5" rx="1"/><rect x="2" y="10" width="20" height="5" rx="1"/><rect x="2" y="17" width="20" height="4" rx="1"/><circle cx="6" cy="5.5" r="1" fill="currentColor"/><circle cx="6" cy="12.5" r="1" fill="currentColor"/></svg>
        Backend
      </div>
    </div>

    <div class="actor">
      <div class="actor-box mpesa">
        <!-- Phone icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="18" r="1" fill="currentColor"/></svg>
        M-Pesa
      </div>
    </div>

    <div class="actor">
      <div class="actor-box database">
        <!-- Database icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>
        Database
      </div>
    </div>

  </div><!-- /actors-row -->

  <!-- LIFELINES -->
  <div class="lifelines">
    <div class="lifeline"><div class="lifeline-line member"></div></div>
    <div class="lifeline"><div class="lifeline-line frontend"></div></div>
    <div class="lifeline"><div class="lifeline-line backend"></div></div>
    <div class="lifeline"><div class="lifeline-line mpesa"></div></div>
    <div class="lifeline"><div class="lifeline-line database"></div></div>
  </div>

  <!-- SEQUENCE STEPS CANVAS (SVG) -->
  <div class="steps">
    <svg id="flowSvg" width="960" height="580" style="position:absolute;top:0;left:0;overflow:visible;">

      <!-- ─── COLUMN X POSITIONS (centre of each lifeline) ─── -->
      <!-- Member=80  Frontend=240  Backend=400  MPesa=560  Database=720 -->

      <!-- ── STEP 1: Member → Frontend ── -->
      <!-- Dot on Member line -->
      <circle cx="80" cy="40" r="11" fill="#3b82f6"/>
      <text x="80" y="44" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">1</text>
      <!-- Arrow line -->
      <line x1="80" y1="40" x2="232" y2="40" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="0"/>
      <!-- Arrowhead -->
      <polygon points="232,35 246,40 232,45" fill="#3b82f6"/>
      <!-- Label -->
      <text x="160" y="30" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="Inter">Click Contribute button</text>

      <!-- ── STEP 2: Frontend → Backend: HTTP POST ── -->
      <circle cx="240" cy="110" r="11" fill="#06b6d4"/>
      <text x="240" y="114" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">2</text>
      <line x1="240" y1="110" x2="392" y2="110" stroke="#06b6d4" stroke-width="1.5"/>
      <polygon points="392,105 406,110 392,115" fill="#06b6d4"/>
      <text x="320" y="100" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="Inter">POST /mpesa/stkpush (Amount, Phone)</text>

      <!-- ── STEP 3: Backend → M-Pesa: STK Push Request ── -->
      <circle cx="400" cy="180" r="11" fill="#22c55e"/>
      <text x="400" y="184" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">3</text>
      <line x1="400" y1="180" x2="552" y2="180" stroke="#22c55e" stroke-width="1.5"/>
      <polygon points="552,175 566,180 552,185" fill="#22c55e"/>
      <text x="480" y="170" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="Inter">Initiate STK Push Request</text>

      <!-- ── STEP 4: M-Pesa → Backend: CheckoutRequestID (return) ── -->
      <circle cx="560" cy="240" r="11" fill="#ef4444"/>
      <text x="560" y="244" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">4</text>
      <line x1="400" y1="240" x2="555" y2="240" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
      <polygon points="407,235 393,240 407,245" fill="#ef4444"/>
      <text x="480" y="230" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="Inter">Returns CheckoutRequestID</text>

      <!-- ── STEP 5: Backend → Frontend: "Check your phone" ── -->
      <circle cx="400" cy="300" r="11" fill="#22c55e"/>
      <text x="400" y="304" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">5</text>
      <line x1="240" y1="300" x2="395" y2="300" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
      <polygon points="247,295 233,300 247,305" fill="#22c55e"/>
      <text x="320" y="290" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="Inter">Response: "Check your phone"</text>

      <!-- ── STEP 6: M-Pesa → Member: PIN Prompt ── -->
      <circle cx="560" cy="360" r="11" fill="#ef4444"/>
      <text x="560" y="364" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">6</text>
      <line x1="80" y1="360" x2="555" y2="360" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
      <polygon points="87,355 73,360 87,365" fill="#ef4444"/>
      <text x="320" y="350" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="Inter">USSD PIN Prompt on phone</text>

      <!-- ── STEP 7: Member → M-Pesa: Enters PIN ── -->
      <circle cx="80" cy="420" r="11" fill="#3b82f6"/>
      <text x="80" y="424" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">7</text>
      <line x1="80" y1="420" x2="552" y2="420" stroke="#3b82f6" stroke-width="1.5"/>
      <polygon points="552,415 566,420 552,425" fill="#3b82f6"/>
      <text x="320" y="410" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="Inter">Member enters M-Pesa PIN</text>

      <!-- ── STEP 8: M-Pesa → Backend: Webhook Callback ── -->
      <circle cx="560" cy="480" r="11" fill="#ef4444"/>
      <text x="560" y="484" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">8</text>
      <line x1="400" y1="480" x2="555" y2="480" stroke="#ef4444" stroke-width="1.5"/>
      <polygon points="407,475 393,480 407,485" fill="#ef4444"/>
      <text x="480" y="470" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="Inter">Webhook Callback (Status, MpesaRef)</text>

      <!-- ── STEP 9: Backend → Database: Write Contribution ── -->
      <circle cx="400" cy="530" r="11" fill="#22c55e"/>
      <text x="400" y="534" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">9</text>
      <line x1="400" y1="530" x2="712" y2="530" stroke="#f59e0b" stroke-width="1.5"/>
      <polygon points="712,525 726,530 712,535" fill="#f59e0b"/>
      <text x="560" y="520" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="Inter">Write Contribution + Update Chama Balance</text>

      <!-- ── STEP 10: Backend → Frontend: Socket.io event ── -->
      <circle cx="400" cy="575" r="11" fill="#22c55e"/>
      <text x="400" y="579" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">10</text>
      <line x1="240" y1="575" x2="395" y2="575" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
      <polygon points="247,570 233,575 247,580" fill="#22c55e"/>
      <text x="320" y="565" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="Inter">Socket.io: payment_success event</text>

    </svg>
  </div><!-- /steps -->

</div><!-- /diagram -->

<!-- LEGEND -->
<div style="display:flex;gap:32px;margin-top:40px;padding:16px 28px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;">
  <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,0.6);">
    <div style="width:32px;height:1.5px;background:#aaa;"></div> Synchronous call
  </div>
  <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,0.6);">
    <div style="width:32px;height:1.5px;background:#aaa;border-top:1.5px dashed #aaa;"></div> Return / Async response
  </div>
  <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,0.6);">
    <svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="#3b82f6"/><text x="10" y="14" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">N</text></svg>
    Numbered sequence step
  </div>
</div>

<button class="print-btn" onclick="window.print()">🖨️ Print / Save as PDF</button>

</body>
</html>

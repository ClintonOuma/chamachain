<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ChamaChain — M-Pesa STK Push Lifecycle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
    min-height: 100vh;
  }
  .container {
    width: 600px;
    background: rgba(13, 13, 20, 0.95);
    padding: 40px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    color: #fff;
    font-size: 16px;
    margin-bottom: 30px;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
  }
  .node {
    width: 220px;
    padding: 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    color: #fff;
    text-align: center;
    margin: 15px 0;
    position: relative;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .start { width: 30px; height: 30px; background: #fff; border-radius: 50%; }
  .end { width: 30px; height: 30px; border: 4px solid #fff; background: #000; border-radius: 50%; }
  .action { background: #3b82f6; }
  .decision { width: 80px; height: 80px; background: #8b5cf6; transform: rotate(45deg); display: flex; align-items: center; justify-content: center; margin: 30px 0; }
  .decision span { transform: rotate(-45deg); font-size: 10px; font-weight: bold; }
  
  .line { width: 2px; height: 30px; background: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div class="container">
    <h1>Activity Diagram: M-Pesa STK Push Lifecycle</h1>
    
    <div class="start"></div>
    <div class="line"></div>
    
    <div class="node action">User clicks "Contribute"</div>
    <div class="line"></div>
    
    <div class="node action">Frontend sends Request to Backend</div>
    <div class="line"></div>
    
    <div class="node action">Backend initiates STK Push via Daraja</div>
    <div class="line"></div>
    
    <div class="node action">Phone displays PIN Prompt</div>
    <div class="line"></div>
    
    <div class="decision"><span>PIN Entered?</span></div>
    
    <!-- Yes flow -->
    <div style="display:flex; flex-direction:column; align-items:center;">
        <div class="line"></div>
        <div class="node action">M-Pesa processes Transaction</div>
        <div class="line"></div>
        <div class="node action">Callback received by Backend</div>
        <div class="line"></div>
        <div class="node action">Update Database & Balances</div>
        <div class="line"></div>
        <div class="node action">Notify User via Socket.io</div>
    </div>
    
    <div class="line"></div>
    <div class="end"></div>
</div>
</body>
</html>

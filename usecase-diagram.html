<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ChamaChain — Use Case Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
    min-height: 100vh;
  }
  .container {
    width: 900px;
    background: rgba(13, 13, 20, 0.95);
    padding: 40px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    display: grid;
    grid-template-columns: 150px 1fr 150px;
    gap: 40px;
  }
  .actors {
    display: flex;
    flex-direction: column;
    gap: 40px;
    justify-content: center;
  }
  .actor {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
  }
  .actor svg { width: 32px; height: 32px; stroke: #3b82f6; fill: none; }
  
  .system-boundary {
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
    background: rgba(255,255,255,0.02);
  }
  .use-case {
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid #3b82f6;
    padding: 8px 16px;
    border-radius: 30px;
    color: #fff;
    font-size: 11px;
    text-align: center;
    width: 200px;
  }
</style>
</head>
<body>
<div class="container">
    <div class="actors">
        <div class="actor">
            <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Member
        </div>
        <div class="actor">
            <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Treasurer
        </div>
        <div class="actor">
            <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Admin
        </div>
    </div>
    
    <div class="system-boundary">
        <h2 style="color:rgba(255,255,255,0.3); font-size:12px; margin-bottom:10px;">ChamaChain System Boundary</h2>
        <div class="use-case">Register / Login</div>
        <div class="use-case">Make Contribution</div>
        <div class="use-case">Request Loan</div>
        <div class="use-case">Vote on Loans</div>
        <div class="use-case">Disburse Funds</div>
        <div class="use-case">Manage Chama Settings</div>
        <div class="use-case">Generate Reports</div>
        <div class="use-case">View Global Audit Logs</div>
    </div>
    
    <div class="actors">
        <div class="actor">
            <svg viewBox="0 0 24 24" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="18" r="1"/></svg>
            M-Pesa API
        </div>
        <div class="actor">
            <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            AI Service
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ChamaChain — Loan Request & AI Decision DFD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent; /* Transparent background as requested */
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    width: 1000px;
    background: rgba(13, 13, 20, 0.95); /* Semi-transparent dark for visibility if not on dark word doc */
    padding: 40px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  h1 {
    color: #fff;
    font-size: 18px;
    margin-bottom: 40px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .diagram-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    position: relative;
  }
  .node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 2;
  }
  .box {
    padding: 15px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    text-align: center;
    min-width: 140px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .entity { border: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
  .process { border: 2px solid #8b5cf6; background: rgba(139, 92, 246, 0.1); border-radius: 50px; }
  .external { border: 2px solid #ef4444; background: rgba(239, 68, 68, 0.1); }
  
  .arrow-container {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="container">
    <h1>DFD: Loan Request & AI Decision Process</h1>
    <div class="diagram-grid">
        <!-- Row 1 -->
        <div class="node">
            <div class="box entity">Member</div>
        </div>
        <div class="node" style="grid-column: 3;">
            <div class="box process">1.0 Submit Loan Request</div>
        </div>
        <div class="node" style="grid-column: 5;">
            <div class="box entity">AI Service (FastAPI)</div>
        </div>
        
        <!-- Row 2 -->
        <div class="node" style="grid-row: 2; grid-column: 3;">
            <div class="box process">2.0 Risk Assessment</div>
        </div>
        
        <!-- Row 3 -->
        <div class="node" style="grid-row: 3; grid-column: 1;">
            <div class="box process">4.0 Notify Member</div>
        </div>
        <div class="node" style="grid-row: 3; grid-column: 3;">
            <div class="box process">3.0 Auto-Decision</div>
        </div>
        <div class="node" style="grid-row: 3; grid-column: 5;">
            <div class="box entity">M-Pesa B2C</div>
        </div>
    </div>
    
    <!-- SVG ARROWS -->
    <svg width="1000" height="600" style="position:absolute; top:80px; left:40px; pointer-events:none;">
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#6366f1" />
            </marker>
        </defs>
        <!-- Member to P1 -->
        <line x1="140" y1="25" x2="380" y2="25" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)" />
        <text x="180" y="20" fill="#94a3b8" font-size="10">Loan Details</text>
        
        <!-- P1 to AI Service -->
        <line x1="560" y1="25" x2="800" y2="25" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)" />
        <text x="600" y="20" fill="#94a3b8" font-size="10">Request Profile</text>
        
        <!-- AI to P2 -->
        <line x1="870" y1="50" x2="870" y2="150" stroke="#6366f1" stroke-width="2" />
        <line x1="870" y1="150" x2="560" y2="150" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)" />
        <text x="600" y="145" fill="#94a3b8" font-size="10">Credit Score & Risk Label</text>
        
        <!-- P2 to P3 -->
        <line x1="470" y1="175" x2="470" y2="275" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)" />
        <text x="480" y="240" fill="#94a3b8" font-size="10">Policy Rules Check</text>
        
        <!-- P3 to Notif -->
        <line x1="380" y1="300" x2="140" y2="300" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)" />
        <text x="180" y="295" fill="#94a3b8" font-size="10">Status Update (Appr/Rej)</text>
        
        <!-- P3 to Mpesa -->
        <line x1="560" y1="300" x2="800" y2="300" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)" />
        <text x="600" y="295" fill="#94a3b8" font-size="10">Disbursement Request</text>
    </svg>
</div>
</body>
</html>
